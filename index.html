<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Bloqueante a propósito: decide el tema antes del primer pintado, para
      // no ver un parpadeo al cargar. Si el usuario ya eligió tema a mano
      // (localStorage), se respeta esa elección; si no, se sigue la
      // preferencia del navegador/sistema.
      ;(function () {
        var saved = localStorage.getItem('theme')
        var isDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', isDark)
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alberto Bringas Maza — Desarrollador de Software</title>
    <meta name="description" content="Portfolio de Alberto Bringas Maza, desarrollador de software especializado en React, Python, IA y datos. Proyectos de chatbots RAG, apps geoespaciales y más." />
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Alberto Bringas Maza — Desarrollador de Software" />
    <meta property="og:description" content="Portfolio de Alberto Bringas Maza, desarrollador de software especializado en React, Python, IA y datos." />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:title"      content="Alberto Bringas Maza — Desarrollador de Software" />
    <meta name="twitter:description" content="Portfolio de Alberto Bringas Maza, desarrollador de software especializado en React, Python, IA y datos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Contraparte de public/404.html: restaura la ruta real que quedó
      // codificada en la query string tras la redirección de GitHub Pages.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
