<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirigiendo…</title>
    <script>
      // Truco spa-github-pages: GitHub Pages no soporta rewrites para SPAs con
      // BrowserRouter, así que cualquier ruta desconocida (p.ej. /project/hr-assistant)
      // cae aquí y se redirige a index.html codificando la ruta original en la query.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1 // mantiene "/portfolio-parallax"
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
